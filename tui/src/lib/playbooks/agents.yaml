id: agents
name: .agents
kind: tool
default_instances:
  - id: default
    name: .agents (shared)
    config_dir: ~/.agents
structure:
  - skills/
  - commands/
  - agents/
components:
  skills:
    install_dir: skills/
    strategy: symlink
  commands:
    install_dir: commands/
    strategy: symlink
  agents:
    install_dir: agents/
    strategy: symlink
config_files: []
syncable: false
