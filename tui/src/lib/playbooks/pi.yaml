id: pi
name: Pi
default_instances:
  - id: default
    name: Pi
    config_dir: ~/.pi/agent
structure:
  - prompts/
components:
  skills:
    # Skills, commands, and agents all install exclusively to the shared
    # `~/.agents/*` store rather than any tool-own config dir — Pi (like
    # every other managed tool) reads from there, never from its own
    # ~/.pi/agent/{skills,prompts}.
    install_dir: ~/.agents/skills
    strategy: symlink
  commands:
    install_dir: ~/.agents/commands
    strategy: symlink
config_files:
  - name: Pi Config
    path: settings.json
    format: json
syncable: true
# No `agents` component declared: no native "load agent definition files"
# concept was found anywhere in Pi's coding-agent core.
