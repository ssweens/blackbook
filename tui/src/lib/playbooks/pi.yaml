id: pi
name: Pi
default_instances:
  - id: default
    name: Pi
    config_dir: ~/.pi/agent
structure:
  - prompts/
components:
  skills:
    # Pi reads standalone skills from the shared `.agents/skills` convention
    # (in addition to its own ~/.pi/agent/skills), so blackbook installs
    # there directly instead of duplicating into Pi's own config dir. Pi's
    # plugin-bundled skill components are unaffected — those go through a
    # separate bridge mechanism (see pi-bridge.ts) that doesn't consume this
    # field.
    install_dir: ~/.agents/skills
    strategy: symlink
  commands:
    install_dir: prompts/
    strategy: symlink
config_files:
  - name: Pi Config
    path: settings.json
    format: json
syncable: true
