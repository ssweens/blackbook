id: openai-codex
name: Codex
default_instances:
  - id: default
    name: Codex
    config_dir: ~/.codex
structure: []
components:
  skills:
    # Codex reads skills from the shared `.agents/skills` convention (no
    # separate `.codex/skills` exists), so blackbook installs there directly
    # instead of duplicating into Codex's own config dir.
    install_dir: ~/.agents/skills
    strategy: symlink
  commands:
    install_dir: ~/.agents/commands
    strategy: symlink
  agents:
    install_dir: ~/.agents/agents
    strategy: symlink
config_files:
  - name: Codex Config
    path: config.toml
    format: toml
syncable: true
lifecycle:
  install:
    strategy: package-manager
  update:
    strategy: package-manager
  uninstall:
    strategy: package-manager
  migration_cleanup:
    - cmd: brew
      args: [uninstall, codex]
    - cmd: npm
      args: [uninstall, -g, "@openai/codex"]
    - cmd: pnpm
      args: [remove, -g, "@openai/codex"]
    - cmd: bun
      args: [remove, -g, "@openai/codex"]
  migration_note: "If install methods differ, you can choose migration in the action modal (press m) to uninstall legacy Codex installs and reinstall with your configured package manager."
