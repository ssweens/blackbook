id: opencode
name: OpenCode
default_instances:
  - id: default
    name: OpenCode
    config_dir: ~/.config/opencode
structure:
  - commands/
  - agents/
components:
  skills:
    # OpenCode reads skills from the shared `.agents/skills` convention, so
    # blackbook installs there directly instead of duplicating into
    # OpenCode's own config dir.
    install_dir: ~/.agents/skills
    strategy: symlink
  commands:
    install_dir: ~/.agents/commands
    strategy: symlink
  agents:
    install_dir: ~/.agents/agents
    strategy: symlink
config_files:
  - name: OpenCode Config
    path: opencode.json
    format: json
syncable: true
lifecycle:
  install:
    strategy: package-manager
  update:
    strategy: native
    command:
      cmd: opencode
      args: [upgrade]
  uninstall:
    strategy: package-manager
