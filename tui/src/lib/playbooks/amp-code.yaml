id: amp-code
name: Amp
default_instances:
  - id: default
    name: Amp
    config_dir: ~/.config/amp
structure:
  - commands/
  - agents/
components:
  skills:
    # Amp reads skills from the shared `.agents/skills` convention, so
    # blackbook installs there directly instead of duplicating into Amp's
    # own config dir.
    install_dir: ~/.agents/skills
    strategy: symlink
  commands:
    install_dir: commands/
    strategy: symlink
  agents:
    install_dir: agents/
    strategy: symlink
config_files:
  - name: Amp Config
    path: settings.json
    format: json
syncable: true
lifecycle:
  install:
    strategy: package-manager
  update:
    strategy: native
    command:
      cmd: amp
      args: [update]
  uninstall:
    strategy: package-manager
