name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm publish --provenance needs npm's own registry-url/OIDC setup, so
      # Node.js + npm stay for that step even though install/build use bun.
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install
        working-directory: tui

      - name: Build
        run: bun run build
        working-directory: tui

      - name: Copy files for publish
        run: |
          cp ../LICENSE dist/
          cp ../README.md dist/
        working-directory: tui

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: tui
