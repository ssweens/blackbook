name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: tui

      - name: Type check
        run: bun run typecheck
        working-directory: tui

      - name: Run tests
        run: bun run test
        working-directory: tui

      - name: Build
        run: bun run build
        working-directory: tui
